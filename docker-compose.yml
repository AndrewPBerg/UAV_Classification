services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOCKER_BUILDKIT=1
    image: ast_container
    container_name: ast_script_container
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DEBIAN_FRONTEND=noninteractive
      - WANDB_API_KEY=${WANDB_API_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      # DDP configuration with explicit settings
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PL_TRAINER_STRATEGY=ddp
      - TORCH_DISTRIBUTED_DEBUG=DETAIL
      - NCCL_DEBUG=INFO
      - NCCL_SOCKET_IFNAME=eth0
      - NCCL_P2P_DISABLE=0  # Try enabling P2P now
      - NCCL_IB_DISABLE=1
      - NCCL_BLOCKING_WAIT=1  # Use blocking wait for better stability
      - TORCH_NCCL_ASYNC_ERROR_HANDLING=1  # Enable async error handling
      - WANDB_START_METHOD=thread
      - WANDB_AGENT_DISABLE_FLAPPING=true  # Prevent wandb agent from stopping on failures
      - MASTER_ADDR=localhost
      - MASTER_PORT=12355  # Specific port for DDP communication
      - TORCH_CPP_LOG_LEVEL=INFO  # More verbose PyTorch logging
      - TORCH_SHOW_CPP_STACKTRACES=1  # Show C++ stack traces for better debugging

    volumes:
      - ./src:/app/src  # Only mount the src directory as read-only
      - ./src/datasets/.:/app/src/datasets
      - ./src/model_cache:/app/src/model_cache  # Mount the model_cache directory
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    # Change the command to explicitly use sweeps.py for testing
    # command: python3 script.py
    # command: python3 main.py
    command: python3 -m torch.distributed.run --nproc_per_node=2 sweeps.py
    # command: /bin/bash # interactive shell new
    stdin_open: true
    tty: true
    working_dir: /app/src
    user: root
    networks:
      - app_network
    shm_size: 16gb  # Increase shared memory for better DDP performance
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    # Add healthcheck to make sure container stays healthy
    healthcheck:
      test: ["CMD", "nvidia-smi"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  datasets:
    driver: local
  src:
  model_cache:

networks:
  app_network:
    driver: bridge

# Add a .env file with the following content to set default compose options
# COMPOSE_COMMAND_OPTIONS=--remove-orphans